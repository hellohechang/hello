<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="assets">
  <link id="hicode" rel="stylesheet" href="">
  <link rel="stylesheet icon" href="/img/icon1.png">
  <link rel="stylesheet" href="/css/iconfont.css?v=1672195985795hechang">
  <link rel="stylesheet" href="/css/note.css?v=1672195985795hechang">
  <title class="notetitle">NoteBook</title>
</head>

<body>
  <div class="box">
    <!-- <div class="bg"></div> -->
    <div class="imgyulan">
      <img src="" alt="">
    </div>
    <div class="pageSearch">
      <input class="hinp" autocomplete="off" type="search">
      <div class="pageSearchNum"></div>
      <div flag="pre" class="hpre iconfont icon-up" cursor></div>
      <div flag="next" class="hnext iconfont icon-Down" cursor></div>
      <div flag="x" class="hx iconfont icon-guanbi" cursor></div>
    </div>
    <div class="notebotlist">
      <div cursor class="showDir iconfont icon-bofangliebiao"></div>
      <div cursor class="pageSearchOn iconfont icon-search"></div>
      <div cursor class="fsbg iconfont icon-zhuti"></div>
      <div cursor class="fszd iconfont icon-jiajian1"></div>
      <div cursor class="fsjx iconfont icon-jiajian"></div>
      <div cursor class="editnote iconfont icon-bianji"></div>
      <div cursor class="totop iconfont icon-dingbu"></div>
    </div>
    <section class="markdownbox">
      <div class="from">
        <div cursor class="logo"></div>
      </div>
      <div class="markdown"></div>
    </section>
    <div class="navwrap">
      <nav>
        <ul class="dirBox"></ul>
      </nav>
    </div>
  </div>
  <script src="/js/jquery.js"></script>
  <!-- <script src="/js/marked.min.js"></script> -->
  <script src="/js/markdown.js"></script>
  <script src="/js/highlight.min.js"></script>
  <script src="/js/highlight.js"></script>
  <script src="/js/common.js?v=1672195985795hechang"></script>
  <script src="/js/note.js?v=1672195985795hechang"></script>
</body>

</html>
