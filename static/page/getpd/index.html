    /* 选中背景和字体颜色 */
    ::selection {
      background: #000;
      color: #fff;
    }

    ::-moz-selection {
      background: #000;
      color: #fff;
    }

    ::-webkit-selection {
      background: #000;
      color: #fff;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
      font-family: Consolas, monospace;
    }

    input {
      font-family: Consolas, monospace;
    }

    .box {
      display: flex;
      width: 90%;
      max-width: 600px;
      margin: 50px auto;
      height: 40px;
      font-size: 0px;
      line-height: 40px;
      border: 1px solid #ccc;
    }

    .box #eye {
      flex: none;
      display: none;
      height: 100%;
      text-align: center;
      font-size: 20px;
      padding: 0 5px;
      color: #aaa;
      cursor: pointer;
    }

    .box #eye:hover {
      color: rgb(70, 70, 70);
    }

    .box #text {
      flex: auto;
      font-size: 20px;
      outline: none;
      padding: 0;
      margin: 0;
      border: none;
      text-align: center;
      width: 100%;
      height: 100%;
    }

    .pdbox,
    p {
      font-size: 30px;
      text-align: center;
      color: rgb(0, 204, 255);
    }

    .pdbox {
      cursor: pointer;
    }
  </style>
</head>

        let pd = pdbox.innerText.trim()
        if (pd !== '') {
          copyText(pd)
        }
      }
      function _alert(context, type) {
        let p = document.createElement('p')
        p.innerText = context
        if (!type) {
          p.style.color = 'rgb(9, 255, 0)'
        } else {
          p.style.color = 'red'
        }
        document.body.appendChild(p)
        setTimeout(() => {
          p.remove()
        }, 3000)
      }
      function copyText(content) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(content).then(_ => {
            _alert('复制成功')
          }).catch(_ => {
            _alert("复制失败", 1);
          })
        } else {
          if (typeof document.execCommand !== "function") {
            _alert("复制失败", 1);
            return;
          }
          window.getSelection().removeAllRanges();
          let div = document.createElement('div'),
            range = document.createRange();
          div.innerText = content;
          div.setAttribute('style', 'position: fixed;height: 1px;fontSize: 1px;overflow: hidden;');
          document.body.appendChild(div)
          range.selectNode(div);
          window.getSelection().addRange(range);
          document.execCommand('copy');
          div.remove()
          _alert('复制成功')
        }
      }

          cxt.translate(this.x, this.y);
          cxt.rotate(this.r);
          cxt.drawImage(img, 0, 0, xc, xc)
          cxt.restore();
        }
        // 修改樱花位置,模拟飘落.
        Sakura.prototype.update = function () {
          this.x = this.fn.x(this.x, this.y);
          this.y = this.fn.y(this.y, this.y);
          this.r = this.fn.r(this.r);
          // 如果樱花越界, 重新调整位置
          if (this.x > window.innerWidth || this.x < 0 ||
            this.y > window.innerHeight || this.y < 0) {
            // 樱花出现次数限制
            if (limitArray[this.idx] == 0) return;
            if (limitArray[this.idx] > 0) {
              limitArray[this.idx]--;
            }
            this.r = getRandom('fnr');
            if (Math.random() > 0.4) {
              this.x = getRandom('x');
              this.y = 0;
              this.s = getRandom('s');
              this.r = getRandom('r');
            } else {
              this.x = window.innerWidth;
              this.y = getRandom('y');
              this.s = getRandom('s');
              this.r = getRandom('r');
            }
          }
        }
        // 所有樱花实例数组
        SakuraList = function () {
          this.list = [];
        }
        // 添加一片樱花实例
        SakuraList.prototype.push = function (sakura) {
          this.list.push(sakura);
        }
        // 遍历修改所有樱花位置
        SakuraList.prototype.update = function () {
          for (var i = 0, len = this.list.length; i < len; i++) {
            this.list[i].update();
          }
        }
        // 遍历绘制所有樱花
        SakuraList.prototype.draw = function (cxt) {
          for (var i = 0, len = this.list.length; i < len; i++) {
            this.list[i].draw(cxt);
          }
        }
        // 生成随机位置策略
        function getRandom(option) {
          var ret, random;
          switch (option) {
            case 'x':
              ret = Math.random() * window.innerWidth;
              break;
            case 'y':
              ret = Math.random() * window.innerHeight;
              break;
            case 's':
              ret = Math.random();
              break;
            case 'r':
              ret = Math.random() * 6;
              break;
            case 'fnx':
              random = -0.5 + Math.random() * 1;
              ret = function (x, y) {
                return x + 0.5 * random - 1.7;
              };
              break;
            case 'fny':
              random = 1.5 + Math.random() * 0.7
              ret = function (x, y) {
                return y + random;
              };
              break;
            case 'fnr':
              random = Math.random() * 0.03;
              ret = function (r) {
                return r + random;
              };
              break;
          }
          return ret;
        }
        // 樱花入口
        function startSakura() {
          stop()
          init()
          requestAnimationFrame = window.requestAnimationFrame ||
            window.mozRequestAnimationFrame ||
            window.webkitRequestAnimationFrame ||
            window.msRequestAnimationFrame ||
            window.oRequestAnimationFrame;
          var canvas = document.createElement('canvas'),
            cxt;
          staticx = true;
          canvas.height = window.innerHeight;
          canvas.width = window.innerWidth;
          canvas.setAttribute('style', 'position: fixed;left: 0;top: 0;pointer-events: none;z-index: 999999999;');
          canvas.setAttribute('id', 'canvas_sakura');
          document.body.appendChild(canvas);
          cxt = canvas.getContext('2d');
          let sakuraList = new SakuraList();//生成储存樱花实例数组
          for (let i = 0; i < sakuraNum; i++) {
            let sakura, randomX, randomY, randomS, randomR, randomFnx, randomFny;
            randomX = getRandom('x');
            randomY = getRandom('y');
            randomR = getRandom('r');
            randomS = getRandom('s');
            randomFnx = getRandom('fnx');
            randomFny = getRandom('fny');
            randomFnR = getRandom('fnr');
            sakura = new Sakura(randomX, randomY, randomS, randomR, {//生成一片樱花实例
              x: randomFnx,
              y: randomFny,
              r: randomFnR
            }, i);
            sakura.draw(cxt);//绘制樱花
            sakuraList.push(sakura);//放入樱花数组
          }
          // 递归 更新所有樱花位置 绘制修改后的樱花
          let flag = true
          timer = requestAnimationFrame(function () {
            cxt.clearRect(0, 0, canvas.width, canvas.height);
            // 更新樱花位置
            sakuraList.update();
            // 绘制修改后的樱花
            sakuraList.draw(cxt);
            //所有樱花次数都为0，关闭樱花
            if (limitArray.every(item => item == 0) && flag === true) {
              flag = false
              setTimeout(stop, 10000)
            }
            timer = requestAnimationFrame(arguments.callee);
          })
        }
        // 自适应屏幕大小改变
        window.onresize = function () {
          let canvasSnow = document.getElementById('canvas_snow');
          if (canvasSnow) {
            canvasSnow.width = window.innerWidth;
            canvasSnow.height = window.innerHeight;
          }
        }
        // 加载完樱花图后开启
        img.onload = function () {
          startSakura();
        }
        // 关闭樱花特效
        function stop() {
          let child = document.getElementById("canvas_sakura");
          if (child) {
            child.remove();
          }
          if (timer) {
            window.cancelAnimationFrame(timer);
            timer = null
          }
        }
        window.startSakura = startSakura
      }()
      setInterval(() => {
        startSakura()
      }, 1000 * 60 * 5);
      startSakura()
    }()
  </script>
</body>

</html>
