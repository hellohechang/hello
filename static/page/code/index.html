<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="assets">
  <link rel="stylesheet" href="/css/reset.css?v=1672195985785hechang" />
  <link rel="stylesheet" href="/css/iconfont.css?v=1672195985784hechang">
  <link rel="stylesheet icon" href="/img/code.png">
  <title>QR code</title>
  <style>
    html,body{
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #text {
      display: block;
      width: 90%;
      max-width: 600px;
      height: 40px;
      font-size: 20px;
      outline: none;
      margin: 50px auto;
      border: 1px solid #ccc;
      padding-left: 10px
    }

    #qrcode {
      display: none;
      margin: 0 auto;
      width: 200px;
      height: 200px;
      padding: 30px;
      border-radius: 10px;
      border: 1px solid #ccc
    }
  </style>
</head>

<body>
  <input autocomplete="off" placeholder="输入内容" id="text" type="search" />
  <div id="qrcode"></div>
  <script src="/js/jquery.js"></script>
  <script src="/js/qrcode.min.js"></script>
  <script src="/js/common.js?v=1672195985785hechang"></script>
  <script type="text/javascript">
    var $qrcode = $("#qrcode"),
      $text = $("#text");
    var qrcode = new QRCode($qrcode[0],
      {
        width: 200,
        height: 200,
      });
    function makeCode(val) {
      if (!val) {
        $qrcode.fadeOut(100);
        return
      }
      $qrcode.fadeIn(100);
      val = isurl(val) ? encodeURI(val) : val; qrcode.makeCode(val)
    }
    $text.on("input", function () {
      let val = $(this).val().trim();
      makeCode(val)
    });
  </script>
</body>

</html>
