<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="assets">
  <link rel="stylesheet" href="/css/reset.css?v=1672195985796hechang">
  <link rel="stylesheet" href="/css/iconfont.css?v=1672195985796hechang">
  <link rel="stylesheet" href="/css/notes.css?v=1672195985796hechang">
  <link rel="stylesheet icon" href="/img/icon1.png">
  <title>NoteBook</title>
</head>

<body>
  <!-- 背景 -->
  <div class="mbg"></div>
  <div class="box">
    <!-- 笔记列表 -->
    <div class="toplist">
      <div class="topcenter">
        <div cursor class="addnote"></div>
        <input autocomplete="off" type="search">
        <div cursor class="pagenote"></div>
      </div>
    </div>
    <section class="menu"></section>
    <select cursor class="showpage">
      <option value="20">20/页</option>
      <option value="40">40/页</option>
      <option value="60">60/页</option>
      <option value="80">80/页</option>
      <option value="100">100/页</option>
      <option value="200">200/页</option>
      <option value="500">500/页</option>
    </select>
  </div>
  <!-- 二维码 -->
  <div class="codewrap">
    <div class="sharebox">
      <div class="getcode"></div>
      <input class="linkCheck" type="text" value="">
    </div>
  </div>
  <script src="/js/jquery.js"></script>
  <script src="/js/qrcode.min.js"></script>
  <script src="/js/common.js?v=1672195985796hechang"></script>
  <script src="/js/allnote.js?v=1672195985796hechang"></script>
</body>

</html>
